project_id = "cepraea"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "https://cepraea.vercel.app/**", "https://cepraea-*-davi-sermenhos-projects.vercel.app/**"]
jwt_expiry = 3600
enable_signup = true
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits"

[auth.captcha]
# CEPR-AUTH-02E: Cloudflare Turnstile (managed mode).
# Secret abaixo é a chave de teste pública da Cloudflare — sempre válida em dev/preview.
# Em produção, configurar no dashboard Supabase: Auth > Settings > Captcha.
enabled = true
provider = "turnstile"
secret = "1x0000000000000000000000000000000AA"

[auth.rate_limit]
email_sent = 2
token_refresh = 150
token_verifications = 30

[edge_runtime]
enabled = false

project_id = "cepraea"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits"
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_confirmations = true
secure_password_change = true
otp_expiry = 3600

[auth.email.smtp]
enabled = false

[auth.rate_limit]
email_sent = 10
sign_in_sign_ups = 30
token_refresh = 150
token_verifications = 30

# CEPR-AUTH-02E §12: bloco [auth.captcha] será adicionado em PR de follow-up
# após configurar TURNSTILE_SECRET_KEY como env do projeto Supabase.

[edge_runtime]
enabled = false

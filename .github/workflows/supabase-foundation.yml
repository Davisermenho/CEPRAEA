name: Supabase Foundation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feat/supabase-foundation

jobs:
  foundation:
    if: github.event_name == 'push' || github.head_ref == 'feat/supabase-foundation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - uses: supabase/setup-cli@v1
        with:
          version: 2.98.1
      - run: supabase start
      - run: npm run validate:supabase-foundation

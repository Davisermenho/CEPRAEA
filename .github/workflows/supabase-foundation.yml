name: Supabase Foundation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/supabase-foundation

jobs:
  foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: npm run validate:supabase-foundation

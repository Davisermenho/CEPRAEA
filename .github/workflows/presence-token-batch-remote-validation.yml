name: Presence Token Batch Remote Validation

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
  SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
  SUPABASE_TEST_TEAM_ID: ${{ secrets.SUPABASE_TEST_TEAM_ID }}
  SUPABASE_TEST_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
  SUPABASE_TEST_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}

jobs:
  validate:
    name: Validate presence token batch flow
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Validate required secrets are present
        shell: bash
        run: |
          missing=0
          for key in SUPABASE_TEST_URL SUPABASE_TEST_ANON_KEY SUPABASE_TEST_TEAM_ID SUPABASE_TEST_EMAIL SUPABASE_TEST_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run remote presence token batch validation
        run: npm run test:presence-token-batch:remote

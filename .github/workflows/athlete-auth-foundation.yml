name: Athlete Auth Foundation

on:
  pull_request:
    branches:
      - main

jobs:
  athlete-auth:
    if: github.head_ref == 'migration/athlete-auth-foundation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: npm run validate:athlete-auth-foundation

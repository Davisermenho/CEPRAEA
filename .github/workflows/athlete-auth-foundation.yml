name: Athlete Auth Foundation

on:
  pull_request:
    branches:
      - main

jobs:
  athlete-auth:
    if: github.head_ref == 'migration/athlete-auth-foundation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - uses: supabase/setup-cli@v1
        with:
          version: 2.98.1
      - run: supabase start
      - run: npm run validate:athlete-auth-foundation

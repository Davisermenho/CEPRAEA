name: PR Evidence Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'PR number to validate (required for workflow_dispatch)'
        required: true
        type: number

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

jobs:
  pr-evidence-guard:
    name: pr-evidence-guard
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR template evidence fields
        uses: actions/github-script@v8
        with:
          script: |
            let pr;
            if (context.eventName === 'workflow_dispatch') {
              const pullNumber = parseInt(context.payload.inputs.pull_number);
              const prResponse = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
              });
              pr = prResponse.data;
            } else {
              pr = context.payload.pull_request;
            }
            const body = pr.body || '';
            const strictMode =
              context.eventName === 'workflow_dispatch' ||
              (context.eventName === 'pull_request' &&
                context.payload.action === 'ready_for_review');

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const scoutRegexes = [
              /^src\/features\/scout\//,
              /^src\/features\/auth\//,
              /^src\/features\/atleta\//,
              /^src\/features\/presence-tokens\//,
              /^src\/lib\/supabase\.ts$/,
              /^supabase\/migrations\//,
              /^supabase\/tests\//,
              /^supabase\/migrations\/\d+_scout/,
              /^supabase\/migrations\/\d+_presence/,
              /^supabase\/migrations\/\d+_cepr_00[89]/,
              /^supabase\/tests\/[^/]*scout/,
              /^supabase\/functions\//,
              /^e2e\/scout\//,
              /^playwright\.scout-preview-smoke\.config\.ts$/,
              /^\.github\/workflows\/scout-preview-smoke\.yml$/,
            ];

            const scoutTouched = files.some((file) =>
              scoutRegexes.some((regex) => regex.test(file.filename)),
            );

            const mandatory = [
              'Escopo alterado',
              'Arquivos alterados',
              'Comandos executados',
              'Resultado dos comandos',
            ];

            const scoutMandatory = [
              'URL do Preview Vercel',
              'Link do run `scout-preview-smoke`',
              'Logs críticos do preview',
            ];

            const requiredChecks = [
              'typecheck',
              'test',
              'build',
              'deps-check',
              'runtime-legacy',
              'validate-mvp-v1',
            ];
            if (scoutTouched) {
              requiredChecks.push('scout-preview-smoke');
            }

            const extractValue = (label) => {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`^- ${escaped}:\\s*(.*)$`, 'm');
              const match = body.match(regex);
              return (match && match[1] ? match[1] : '').trim();
            };

            const isFilled = (value) => {
              if (!value) return false;
              if (value === '-') return false;
              if (/^<!--.*-->$/.test(value)) return false;
              return true;
            };

            const missing = [];

            for (const field of mandatory) {
              if (!isFilled(extractValue(field))) {
                missing.push(field);
              }
            }

            if (scoutTouched) {
              for (const field of scoutMandatory) {
                if (!isFilled(extractValue(field))) {
                  missing.push(field);
                }
              }

              const scoutRunLink = extractValue('Link do run `scout-preview-smoke`');
              const scoutRunMatch = scoutRunLink.match(
                /^https:\/\/github\.com\/[^/]+\/[^/]+\/actions\/runs\/(\d+)/,
              );
              if (
                isFilled(scoutRunLink) &&
                !scoutRunMatch
              ) {
                missing.push('Link do run `scout-preview-smoke` (formato inválido)');
              } else if (scoutRunMatch) {
                const runId = Number(scoutRunMatch[1]);
                try {
                  const run = await github.rest.actions.getWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: runId,
                  });
                  if (strictMode && run.data.conclusion !== 'success') {
                    missing.push(
                      `Link do run \`scout-preview-smoke\` (conclusion=${run.data.conclusion || 'unknown'})`,
                    );
                  }
                } catch (error) {
                  missing.push('Link do run `scout-preview-smoke` (run não acessível)');
                }
              }
            }

            const checkRuns = await github.paginate(
              github.rest.checks.listForRef,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                per_page: 100,
              },
              (response) => response.data.check_runs,
            );

            const latestCheckByName = new Map();
            for (const run of checkRuns) {
              if (!run || !run.name) {
                continue;
              }
              const current = latestCheckByName.get(run.name);
              if (!current || new Date(run.started_at || 0) > new Date(current.started_at || 0)) {
                latestCheckByName.set(run.name, run);
              }
            }

            const missingChecks = [];
            const nonSuccessChecks = [];

            for (const checkName of requiredChecks) {
              const run = latestCheckByName.get(checkName);
              if (!run) {
                missingChecks.push(checkName);
                continue;
              }
              if (strictMode && run.conclusion !== 'success') {
                nonSuccessChecks.push(`${checkName}=${run.conclusion || run.status || 'unknown'}`);
              }
            }

            if (missing.length > 0) {
              core.setFailed(
                [
                  'PR template incompleto.',
                  scoutTouched
                    ? 'Este PR toca Scout/Supabase/Auth/RLS e exige evidências completas de preview smoke.'
                    : 'Preencha as evidências técnicas mínimas do PR.',
                  `Campos faltando: ${missing.join(', ')}`,
                ].join(' '),
              );
              return;
            }

            if (strictMode && missingChecks.length > 0) {
              core.setFailed(
                [
                  'Checks obrigatórios ausentes para o commit do PR.',
                  `Faltando: ${missingChecks.join(', ')}`,
                  'Confirme se o workflow CI base está ativo e se os checks foram publicados.',
                ].join(' '),
              );
              return;
            }

            if (nonSuccessChecks.length > 0) {
              core.setFailed(
                [
                  'Checks obrigatórios sem status SUCCESS no modo estrito.',
                  `Status: ${nonSuccessChecks.join(', ')}`,
                  'Ajuste o PR para draft até todos os checks finalizarem com sucesso.',
                ].join(' '),
              );
            } else {
              core.info(
                strictMode
                  ? 'PR template e checks obrigatórios validados com sucesso (modo estrito).'
                  : `PR template validado com sucesso. Checks detectados em modo não estrito. Pendentes: ${missingChecks.length}`,
              );
            }

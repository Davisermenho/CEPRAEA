name: Scout Preview Smoke

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  checks: read
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scout-preview-smoke:
    name: scout-preview-smoke
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Scout scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail

          # Merge queue runs should always execute this required check.
          if [ "$EVENT_NAME" = "merge_group" ]; then
            echo "scout=true" >> "$GITHUB_OUTPUT"
            echo "Merge group detected: forcing scout scope."
            exit 0
          fi

          if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
            echo "Unable to resolve PR base/head SHA; forcing scout scope."
            echo "scout=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(
            git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA"
          )"

          scout_pattern='^(src/features/scout/|src/features/presence-tokens/|src/lib/supabase\.ts$|supabase/migrations/[0-9]+_scout|supabase/migrations/[0-9]+_presence|supabase/migrations/[0-9]+_cepr_00[89]|supabase/tests/[^/]*scout|supabase/functions/|e2e/scout/|playwright\.scout-preview-smoke\.config\.ts$|package-lock\.json$|\.github/workflows/scout-preview-smoke\.yml$)'
          scout_scope=false

          if printf '%s\n' "$changed_files" | grep -Eq "$scout_pattern"; then
            scout_scope=true
          fi

          if printf '%s\n' "$changed_files" | grep -qx 'package.json'; then
            package_diff="$(
              git diff -U0 --no-ext-diff --no-color "$PR_BASE_SHA" "$PR_HEAD_SHA" -- package.json \
                | grep -E '^[+-]' \
                | grep -Ev '^(---|\+\+\+)' \
                || true
            )"
            package_non_ontology="$(
              printf '%s\n' "$package_diff" \
                | grep -Ev '^[+]    "validate:ontology:formal": "bash scripts/validate-ontology-formal.sh",?$|^[-]    "validate:ontology:formal": "bash scripts/validate-ontology-formal.sh",?$|^$' \
                || true
            )"

            if [ -n "$package_non_ontology" ]; then
              scout_scope=true
              echo "package.json contains Scout/runtime-relevant changes."
            else
              echo "package.json change is ontology-only; keeping Scout scope unchanged."
            fi
          fi

          # Detect if only the CI workflow file itself matched (no real Scout features)
          only_ci=false
          if [ "$scout_scope" = "true" ]; then
            non_ci_scout="$(
              printf '%s\n' "$changed_files"                 | grep -E "$scout_pattern"                 | grep -Ev '^\.github/workflows/scout-preview-smoke\.yml$'                 || true
            )"
            if [ -z "$non_ci_scout" ]; then
              only_ci=true
            fi
          fi

          echo "scout=$scout_scope" >> "$GITHUB_OUTPUT"
          echo "only_ci=$only_ci" >> "$GITHUB_OUTPUT"
          echo "Scout scope: $scout_scope | only_ci: $only_ci"

      - name: Skip smoke when PR is out of Scout scope
        if: ${{ steps.scope.outputs.scout != 'true' }}
        run: |
          echo "Sem mudanças de Scout/Supabase/Auth/RLS no escopo monitorado."
          echo "Check obrigatório reportado como sucesso."

      - name: Run scope unit tests
        if: ${{ steps.scope.outputs.scout == 'true' && steps.scope.outputs.only_ci == 'true' }}
        run: |
          echo "Somente o workflow de CI foi alterado. Executando teste de escopo em vez de Playwright."
          bash scripts/ci/test-scout-scope.sh


      - name: Validate required secrets
        if: ${{ steps.scope.outputs.scout == 'true' && steps.scope.outputs.only_ci != 'true' }}
        shell: bash
        run: |
          missing=0
          for key in SMOKE_COACH_EMAIL SMOKE_COACH_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          SMOKE_COACH_EMAIL: ${{ secrets.SMOKE_COACH_EMAIL }}
          SMOKE_COACH_PASSWORD: ${{ secrets.SMOKE_COACH_PASSWORD }}

      - name: Install dependencies
        if: ${{ steps.scope.outputs.scout == 'true' && steps.scope.outputs.only_ci != 'true' }}
        run: npm ci --no-audit --no-fund --loglevel=error


      - name: Resolve Vercel preview URL from Vercel check-run
        if: ${{ steps.scope.outputs.scout == 'true' && steps.scope.outputs.only_ci != 'true' }}
        id: vercel_preview
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          echo "Retrieving deployment preview for sha: $PR_HEAD_SHA"

          preview_url=""
          for attempt in $(seq 1 20); do
            summary="$(
              curl -s -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$PR_HEAD_SHA/check-runs" \
                | python3 -c "import sys,json;runs=json.load(sys.stdin).get('check_runs',[]); r=next((x for x in runs if x.get('name')=='Vercel Preview Comments'),None); print(((r or {}).get('output') or {}).get('summary') or '')"
            )"

            preview_host="$(
              printf '%s' "$summary" \
                | sed -nE 's#.*open-feedback/([^? )]+).*#\1#p' \
                | head -n 1
            )"

            if [ -n "$preview_host" ]; then
              preview_url="https://$preview_host"
            fi

            if [ -n "$preview_url" ]; then
              break
            fi

            echo "Attempt $attempt: preview URL not ready yet."
            sleep 6
          done

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
          if [ -n "$preview_url" ]; then
            echo "Preview URL: $preview_url"
          fi

      - name: Fail when preview URL is unavailable
        if: ${{ steps.scope.outputs.scout == 'true' && steps.scope.outputs.only_ci != 'true' && steps.vercel_preview.outputs.preview_url == '' }}
        run: |
          echo "Preview URL não disponível para o branch/PR atual."
          exit 1

      - name: Run Scout preview smoke
        if: ${{ steps.scope.outputs.scout == 'true' && steps.scope.outputs.only_ci != 'true' }}
        env:
          SMOKE_BASE_URL: ${{ steps.vercel_preview.outputs.preview_url }}
          SMOKE_COACH_EMAIL: ${{ secrets.SMOKE_COACH_EMAIL }}
          SMOKE_COACH_PASSWORD: ${{ secrets.SMOKE_COACH_PASSWORD }}
        run: |
          echo "Running smoke against $SMOKE_BASE_URL"
          npm run test:smoke:scout:preview

      - name: Detect Playwright artifacts
        if: ${{ always() && steps.scope.outputs.scout == 'true' && steps.scope.outputs.only_ci != 'true' }}
        id: artifact_check
        shell: bash
        run: |
          set -euo pipefail
          has_artifacts=false

          first_visible_file="$(
            find playwright-report test-results \
              -type f \
              -not -path '*/.*' \
              -print \
              -quit 2>/dev/null || true
          )"

          if [ -n "$first_visible_file" ]; then
            has_artifacts=true
          fi

          echo "has_artifacts=$has_artifacts" >> "$GITHUB_OUTPUT"

      - name: Upload Playwright report
        if: ${{ always() && steps.artifact_check.outputs.has_artifacts == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-scout-preview-smoke-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

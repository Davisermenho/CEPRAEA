name: Scout Preview Smoke

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scout-preview-smoke:
    name: scout-preview-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Scout scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail

          # Merge queue runs should always execute this required check.
          if [ "$EVENT_NAME" = "merge_group" ]; then
            echo "scout=true" >> "$GITHUB_OUTPUT"
            echo "Merge group detected: forcing scout scope."
            exit 0
          fi

          if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
            echo "Unable to resolve PR base/head SHA; forcing scout scope."
            echo "scout=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(
            git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA"
          )"

          scout_pattern='^(src/features/scout/|src/features/presence-tokens/|src/lib/supabase\.ts$|src/types/|supabase/|e2e/scout/|playwright\.scout-preview-smoke\.config\.ts$|package\.json$|package-lock\.json$|AGENTS\.md$|\.github/workflows/scout-preview-smoke\.yml$)'
          scout_scope=false

          if printf '%s\n' "$changed_files" | grep -Eq "$scout_pattern"; then
            scout_scope=true
          fi

          echo "scout=$scout_scope" >> "$GITHUB_OUTPUT"
          echo "Scout scope: $scout_scope"

      - name: Skip smoke when PR is out of Scout scope
        if: ${{ steps.scope.outputs.scout != 'true' }}
        run: |
          echo "Sem mudanças de Scout/Supabase/Auth/RLS no escopo monitorado."
          echo "Check obrigatório reportado como sucesso."

      - name: Setup Node
        if: ${{ steps.scope.outputs.scout == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate required secrets
        if: ${{ steps.scope.outputs.scout == 'true' }}
        shell: bash
        run: |
          missing=0
          for key in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID SMOKE_COACH_EMAIL SMOKE_COACH_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          SMOKE_COACH_EMAIL: ${{ secrets.SMOKE_COACH_EMAIL }}
          SMOKE_COACH_PASSWORD: ${{ secrets.SMOKE_COACH_PASSWORD }}

      - name: Install dependencies
        if: ${{ steps.scope.outputs.scout == 'true' }}
        run: npm ci --no-audit --no-fund --loglevel=error

      - name: Install Playwright browser
        if: ${{ steps.scope.outputs.scout == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Resolve Vercel preview URL
        if: ${{ steps.scope.outputs.scout == 'true' }}
        id: vercel_preview
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          PR_BRANCH: ${{ github.head_ref || github.event.pull_request.head.ref || github.event.merge_group.head_ref || github.ref_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          PR_BRANCH="${PR_BRANCH#refs/heads/}"
          echo "Retrieving deployment preview for branch: $PR_BRANCH (sha: $PR_HEAD_SHA)"

          preview_host=""
          for attempt in $(seq 1 16); do
            response=""
            for endpoint in \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&target=preview&limit=100" \
              "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=preview&limit=100"
            do
              echo "Attempt $attempt: querying $endpoint"
              if response="$(curl -fsS --retry 3 --retry-all-errors --retry-delay 3 \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                "$endpoint")"; then
                break
              fi
            done

            if [ -z "$response" ] || ! jq -e '.deployments' >/dev/null 2>&1 <<<"$response"; then
              echo "Attempt $attempt: invalid/empty deployments payload."
              sleep 15
              continue
            fi

            preview_host="$(jq -r --arg branch "$PR_BRANCH" --arg sha "$PR_HEAD_SHA" '
              [
                .deployments[]
                | select((.readyState // .state // "") == "READY")
                | select(
                    (.meta.githubCommitRef // "") == $branch
                    or (.meta.githubCommitSha // "") == $sha
                  )
                | .url
              ][0] // empty
            ' <<<"$response")"

            if [ -n "$preview_host" ]; then
              break
            fi

            echo "Attempt $attempt: READY deployment not found yet."
            sleep 15
          done

          echo "preview_url=$preview_host" >> "$GITHUB_OUTPUT"
          if [ -n "$preview_host" ]; then
            echo "Preview host: $preview_host"
          fi

      - name: Fail when preview URL is unavailable
        if: ${{ steps.scope.outputs.scout == 'true' && steps.vercel_preview.outputs.preview_url == '' }}
        run: |
          echo "Preview URL não disponível para o branch/PR atual."
          exit 1

      - name: Run Scout preview smoke
        if: ${{ steps.scope.outputs.scout == 'true' }}
        env:
          SMOKE_BASE_URL: https://${{ steps.vercel_preview.outputs.preview_url }}
          SMOKE_COACH_EMAIL: ${{ secrets.SMOKE_COACH_EMAIL }}
          SMOKE_COACH_PASSWORD: ${{ secrets.SMOKE_COACH_PASSWORD }}
        run: |
          echo "Running smoke against $SMOKE_BASE_URL"
          npm run test:smoke:scout:preview

      - name: Detect Playwright artifacts
        if: ${{ always() && steps.scope.outputs.scout == 'true' }}
        id: artifact_check
        shell: bash
        run: |
          set -euo pipefail
          has_artifacts=false

          first_visible_file="$(
            find playwright-report test-results \
              -type f \
              -not -path '*/.*' \
              -print \
              -quit 2>/dev/null || true
          )"

          if [ -n "$first_visible_file" ]; then
            has_artifacts=true
          fi

          echo "has_artifacts=$has_artifacts" >> "$GITHUB_OUTPUT"

      - name: Upload Playwright report
        if: ${{ always() && steps.artifact_check.outputs.has_artifacts == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-scout-preview-smoke-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

name: Scout Preview Smoke

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scout-preview-smoke:
    name: scout-preview-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Scout scope
        id: scope
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            scout:
              - 'src/features/scout/**'
              - 'src/features/presence-tokens/**'
              - 'src/lib/supabase.ts'
              - 'src/types/**'
              - 'supabase/**'
              - 'e2e/scout/**'
              - 'playwright.scout-preview-smoke.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'AGENTS.md'
              - '.github/workflows/scout-preview-smoke.yml'

      - name: Skip smoke when PR is out of Scout scope
        if: ${{ steps.scope.outputs.scout != 'true' }}
        run: |
          echo "Sem mudanças de Scout/Supabase/Auth/RLS no escopo monitorado."
          echo "Check obrigatório reportado como sucesso."

      - name: Setup Node
        if: ${{ steps.scope.outputs.scout == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate required secrets
        if: ${{ steps.scope.outputs.scout == 'true' }}
        shell: bash
        run: |
          missing=0
          for key in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_TEAM_ID SMOKE_COACH_EMAIL SMOKE_COACH_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          SMOKE_COACH_EMAIL: ${{ secrets.SMOKE_COACH_EMAIL }}
          SMOKE_COACH_PASSWORD: ${{ secrets.SMOKE_COACH_PASSWORD }}

      - name: Install dependencies
        if: ${{ steps.scope.outputs.scout == 'true' }}
        run: npm ci

      - name: Install Playwright browser
        if: ${{ steps.scope.outputs.scout == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Wait preview build
        if: ${{ steps.scope.outputs.scout == 'true' }}
        run: sleep 45

      - name: Resolve Vercel preview URL
        if: ${{ steps.scope.outputs.scout == 'true' }}
        id: vercel_preview
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          PR_BRANCH: ${{ github.head_ref || github.event.pull_request.head.ref || github.event.merge_group.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          PR_BRANCH="${PR_BRANCH#refs/heads/}"
          echo "Retrieving deployment preview for branch: $PR_BRANCH"
          response="$(curl -fsSL \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&target=preview&limit=50")"

          preview_host="$(jq -r --arg branch "$PR_BRANCH" '
            [
              .deployments[]
              | select((.meta.githubCommitRef // "") == $branch)
              | select((.readyState // .state // "") == "READY")
              | .url
            ][0] // empty
          ' <<<"$response")"

          if [ -z "$preview_host" ]; then
            echo "preview_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Preview host: $preview_host"
          echo "preview_url=$preview_host" >> "$GITHUB_OUTPUT"

      - name: Fail when preview URL is unavailable
        if: ${{ steps.scope.outputs.scout == 'true' && steps.vercel_preview.outputs.preview_url == '' }}
        run: |
          echo "Preview URL não disponível para o branch/PR atual."
          exit 1

      - name: Run Scout preview smoke
        if: ${{ steps.scope.outputs.scout == 'true' }}
        env:
          SMOKE_BASE_URL: https://${{ steps.vercel_preview.outputs.preview_url }}
          SMOKE_COACH_EMAIL: ${{ secrets.SMOKE_COACH_EMAIL }}
          SMOKE_COACH_PASSWORD: ${{ secrets.SMOKE_COACH_PASSWORD }}
        run: |
          echo "Running smoke against $SMOKE_BASE_URL"
          npm run test:smoke:scout:preview

      - name: Detect Playwright artifacts
        if: ${{ always() && steps.scope.outputs.scout == 'true' }}
        id: artifact_check
        shell: bash
        run: |
          set -euo pipefail
          has_artifacts=false

          first_visible_file="$(
            find playwright-report test-results \
              -type f \
              -not -path '*/.*' \
              -print \
              -quit 2>/dev/null || true
          )"

          if [ -n "$first_visible_file" ]; then
            has_artifacts=true
          fi

          echo "has_artifacts=$has_artifacts" >> "$GITHUB_OUTPUT"

      - name: Upload Playwright report
        if: ${{ always() && steps.artifact_check.outputs.has_artifacts == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-scout-preview-smoke-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

name: Scout Contract CEPR-0098D

on:
  pull_request:
    branches:
      - main
  merge_group:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scout-contract-cepr0098d:
    name: scout-contract-cepr0098d
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci --no-audit --no-fund --loglevel=error

      - name: Run CEPR-0098D contract tests
        run: |
          npm run test -- src/features/scout/domain/liveCollectionFlow.contract.test.ts src/features/scout/domain/liveCollectionCompatibility.matrix.test.ts
